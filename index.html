<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today's To-Do</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --cream: #F7F4EE;
    --ink: #1A1A18;
    --ink-light: #6B6B66;
    --ink-faint: #C8C5BC;
    --accent: #D4622A;
    --accent-pale: #FAEEE7;
    --done-bg: #EEF5EE;
    --done-text: #4A7A4A;
    --line: rgba(26,26,24,0.1);
    --radius: 12px;
  }
 
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 1rem 4rem;
  }
 
  /* Header */
  header {
    width: 100%;
    max-width: 540px;
    padding: 3rem 0 1.5rem;
    border-bottom: 1px solid var(--line);
    margin-bottom: 2rem;
  }
 
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    letter-spacing: -0.5px;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 0.25rem;
  }
 
  .logo span { color: var(--accent); }
 
  .date-line {
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--ink-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
 
  /* Main area */
  main {
    width: 100%;
    max-width: 540px;
  }
 
  /* Add task input */
  .add-row {
    display: flex;
    gap: 10px;
    margin-bottom: 2rem;
  }
 
  .add-input {
    flex: 1;
    background: #fff;
    border: 1.5px solid var(--ink-faint);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
 
  .add-input::placeholder { color: var(--ink-faint); }
  .add-input:focus { border-color: var(--accent); }
 
  .add-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }
 
  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.95); }
 
  .add-btn svg { stroke: #fff; }
 
  /* Section label */
  .section-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
 
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }
 
  /* Task list */
  .task-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 2rem;
  }
 
  .task-item {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.85rem 1rem;
    animation: slideIn 0.2s ease;
    transition: opacity 0.2s, border-color 0.15s;
  }
 
  .task-item:hover { border-color: var(--ink-faint); }
 
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
 
  /* Checkbox */
  .check-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--ink-faint);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
    padding: 0;
  }
 
  .check-btn:hover { border-color: var(--accent); }
 
  .check-btn.checked {
    background: var(--done-text);
    border-color: var(--done-text);
  }
 
  .check-btn.checked svg { display: block; }
  .check-btn svg { display: none; stroke: #fff; }
 
  /* Task text */
  .task-text {
    flex: 1;
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.4;
    outline: none;
    background: transparent;
    border: none;
    font-family: 'DM Sans', sans-serif;
    cursor: text;
    transition: color 0.15s;
  }
 
  .task-text:focus { color: var(--ink); }
 
  /* Edit mode underline */
  .task-text[contenteditable="true"] {
    border-bottom: 1px dashed var(--accent);
    padding-bottom: 1px;
  }
 
  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--ink-faint);
  }
 
  /* Action buttons */
  .action-btns {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
 
  .task-item:hover .action-btns { opacity: 1; }
 
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s;
  }
 
  .icon-btn:hover { background: var(--cream); }
  .icon-btn.del:hover { background: #FCEAEA; }
  .icon-btn.del:hover svg { stroke: #C0392B; }
 
  /* Done section */
  .done-section .task-item {
    background: var(--done-bg);
    border-color: transparent;
    opacity: 0.7;
  }
 
  /* Empty state */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--ink-faint);
  }
 
  .empty-icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
    opacity: 0.4;
  }
 
  .empty p { font-size: 0.9rem; line-height: 1.6; }
 
  /* Progress bar */
  .progress-wrap {
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }
 
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--ink-faint);
    border-radius: 99px;
    overflow: hidden;
  }
 
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
 
  .progress-label {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--ink-light);
    min-width: 32px;
    text-align: right;
  }
 
  /* Clear done button */
  .clear-btn {
    background: none;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.4rem 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--ink-light);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    margin-bottom: 0.75rem;
    display: inline-block;
  }
 
  .clear-btn:hover { background: var(--cream); color: var(--ink); }
</style>
</head>
<body>

<!-- Authentication beforehand-->
<div id="authOverlay" style="display:flex; position:fixed; inset:0; background:var(--cream); z-index:100; align-items:center; justify-content:center;">
  <div style="width:100%; max-width:360px; padding:2rem;">
    <div class="logo" style="margin-bottom:1.5rem;">Today's <span>To-Do</span></div>
    <input id="authEmail" type="email" placeholder="Email" class="add-input" style="width:100%; margin-bottom:0.75rem;">
    <input id="authPass" type="password" placeholder="Password" class="add-input" style="width:100%; margin-bottom:1rem;">
    <div style="display:flex; gap:10px;">
      <button id="loginBtn" class="add-btn" style="width:auto; padding:0.65rem 1.5rem; border-radius:var(--radius); font-family:'DM Sans'; font-size:0.9rem;">Log In</button>
      <button id="registerBtn" class="add-btn" style="width:auto; padding:0.65rem 1.5rem; border-radius:var(--radius); font-family:'DM Sans'; font-size:0.9rem; background:var(--ink); color:#fff;">Sign Up</button>
    </div>
    <p id="authError" style="color:var(--accent); font-size:0.8rem; margin-top:0.75rem;"></p>
  </div>
</div>

 
<header>
  <div class="logo">Today's <span>To-Do</span></div>
  <div class="date-line" id="dateDisplay"></div>
  <!-- Sign out button -->
  <button id="signOutBtn" 
     style="display:none; float:right; background:none; 
      border:1px solid var(--line); border-radius:8px; 
      padding:0.3rem 0.75rem; font-size:0.75rem; 
      cursor:pointer; color:var(--ink-light); 
      font-family:'DM Sans';">Sign Out</button>
</header>
 
<main>
  <!-- Add task -->
  <div class="add-row">
    <input class="add-input" id="taskInput" type="text" placeholder="Add a task for today…" maxlength="140" />
    <button class="add-btn" id="addBtn" title="Add task">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>
 
  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap" style="display:none;">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0%</div>
  </div>
 
  <!-- Active tasks -->
  <div id="activeSection">
    <div class="section-label">Tasks</div>
    <ul class="task-list" id="activeList"></ul>
    <div class="empty" id="emptyState">
      <div class="empty-icon">✦</div>
      <p>No tasks yet.<br>Add something to get your day started.</p>
    </div>
  </div>
 
  <!-- Done tasks -->
  <div id="doneSection" style="display:none;" class="done-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;">
      <div class="section-label" style="margin-bottom:0;flex:1;">Done</div>
      <button class="clear-btn" id="clearDoneBtn">Clear all</button>
    </div>
    <ul class="task-list" id="doneList"></ul>
  </div>
</main>
 
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- scripts -->
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>

</body>
</html>
